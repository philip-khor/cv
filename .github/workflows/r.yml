name: Build CV

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: 'cv/**'
  pull_request:
    branches: [main]
    paths: 'cv/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: typst-community/setup-typst@v5

      - name: Install Roboto fonts
        run: sudo apt-get install -y fonts-roboto

      - name: Download Font Awesome 6 OTF fonts
        run: |
          mkdir -p cv/fonts
          curl -sL "https://github.com/FortAwesome/Font-Awesome/releases/download/6.7.2/fontawesome-free-6.7.2-desktop.zip" -o /tmp/fa6.zip
          unzip -q /tmp/fa6.zip -d /tmp/fa6
          cp /tmp/fa6/*/otfs/*.otf cv/fonts/

      - name: Compile CV
        run: typst compile --pdf-standard 1.7 --font-path cv/fonts --package-path typst-packages cv/cv.typ cv/philip_khor-cv.pdf

      - uses: actions/upload-artifact@v7
        with:
          name: cv
          path: cv/philip_khor-cv.pdf
          archive: false
